name: Feature Request
description: Propose new product behavior or an enhancement to existing behavior.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: is this actually a **new architecture/contract/schema/state/event**?
        If so, it's not a feature request — it's an additive-patch proposal. Use the
        **Architecture / Governance Escalation** template instead (CLAUDE.md §7/§8/§11:
        AI agents may not modify architecture; changes need a human-approved additive patch).

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module would own this? (CLAUDE.md §3)
      options:
        - M0 — Platform Core / Shared Kernel
        - M1 — Identity & Organization
        - M2 — Marketplace & Discovery
        - M3 — RFQ Procurement Engine
        - M4 — Business Operations
        - M5 — Trust & Verification
        - M6 — Communication
        - M7 — Monetization
        - M8 — Admin Operations
        - M9 — AI Layer
        - Cross-module / not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or painful today? Who is affected (buyer/vendor/staff)?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should happen instead? Be concrete — this becomes the acceptance criteria.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you looked at and why you didn't pick them.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, related issues/PRs, links to frozen docs this should conform to.
    validations:
      required: false
