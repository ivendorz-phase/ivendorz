name: CI

# Merge-gate (REPOSITORY_STRUCTURE §10; Doc-8B). Never-weaken, necessary-not-sufficient:
# typecheck + lint (incl. import-boundary) + prisma validate + conformance suites + build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify (typecheck · lint · prisma · test · build)
    runs-on: ubuntu-latest
    # Placeholder DB URLs — prisma validate/generate and next build do not connect.
    # Live migration/runtime uses real Supabase values from repository secrets.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ivendorz?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/ivendorz?schema=public"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run prisma:validate
      - run: npm run lint
      - run: npm run test
      # `next build` is the authoritative type gate (it regenerates next-env.d.ts +
      # .next/types and runs tsc). Kept last so type-checking has what it needs.
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    name: E2E + a11y (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
