name: Release

# Main-branch release cut — fires on every push to `main`.
#
# On each push, TriPSs/conventional-changelog-action reads the Conventional Commit history
# since the last `v*` tag and:
#   1. bumps `version` in package.json (semver, derived from feat/fix/BREAKING CHANGE),
#   2. writes the changelog to docs/CHANGELOG.md (registered Engineering docs area,
#      REPOSITORY_STRUCTURE §Ownership Matrix — NOT root; P-5 forbids a new root file),
#   3. commits `chore(release): x.y.z` and pushes the `vX.Y.Z` tag.
# A GitHub Release is then created as a DRAFT — publishing stays a human action.
#
# This workflow never decides *whether* to release; the commit history does. A push with no
# releasable commits (e.g. a docs-only push) is skipped (skip-on-empty), not failed.
#
# LOOP SAFETY: the release commit is pushed with GITHUB_TOKEN. GitHub does not start new
# workflow runs from GITHUB_TOKEN pushes, so the `chore(release)` commit cannot re-trigger
# this workflow. (Tag pushes do not match `on: push: branches` either.)
#
# ⚠ CI GATING (deliberate tradeoff of the push trigger): this fires on the push itself, so it
# runs *in parallel* with CI (which also triggers on push to `main`) and does NOT wait for
# `next build` / Vitest / Playwright to pass. A release can therefore be cut off a commit CI
# is about to fail. If you want "release only off green CI", trigger on
# `workflow_run: { workflows: [CI], branches: [main], types: [completed] }` with an
# `if: github.event.workflow_run.conclusion == 'success'` guard instead (prior variant in git
# history).
#
# NOTE (operational): GITHUB_TOKEN cannot bypass branch protection. If `main` requires PRs or
# status checks for ALL actors, the release commit push will fail — grant this workflow's
# actor a bypass allowance, or the push step errors.
on:
  push:
    branches: [main]

# Needs write scope to push the release commit + tag and to create the draft Release.
permissions:
  contents: write

# Serialize release runs so two quick pushes can't race on the tag/changelog.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Version, changelog & draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # conventional-changelog-action walks history back to the previous tag.
          fetch-depth: 0

      - name: Conventional changelog & version bump
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-message: "chore(release): {version}"
          git-user-name: ivendorz-release-bot
          git-user-email: noreply@ivendorz.com
          version-file: "./package.json"
          output-file: "docs/CHANGELOG.md"
          tag-prefix: "v"
          release-count: "10"
          # No releasable commits (e.g. a docs-only push) is a no-op, not a failure.
          skip-on-empty: "true"

      - name: Create draft GitHub Release
        # Only when the changelog step actually cut a version (skipped=false).
        if: steps.changelog.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          # Via env, not inline — release notes are untrusted commit text.
          NOTES: ${{ steps.changelog.outputs.clean_changelog }}
        run: |
          printf '%s\n' "$NOTES" > release-notes.md
          gh release create "${{ steps.changelog.outputs.tag }}" \
            --title "${{ steps.changelog.outputs.tag }}" \
            --notes-file release-notes.md \
            --draft
